name: To Do the CI/CD pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #Login to Docker 
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      
      #build the docker image
      - name: Build the Docker Image
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/lone-status:latest .

      #Push the Docker Image
      - name: Push the Docker Image
        run: |
          docker push ${{secrets.DOCKER_USERNAME}}/lone-status:latest

      #Login to EC2 instance
      - name: Login to EC2 instance
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{secrets.EC2_HOST}} 
          username: ubuntu
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            docker pull ${{secrets.DOCKER_USERNAME}}/lone-status:latest
            docker stop lone-app || true
            docker rm lone-app || true
            docker run -d -p 8001:8001 --name lone-status ${{secrets.DOCKER_USERNAME}}/lone-status:latest
