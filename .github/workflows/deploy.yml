name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main          # Triggers on every push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/iris-mlops:latest .

      # Step 4: Push to DockerHub
      - name: Push to DockerHub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-mlops:latest

      # Step 5: SSH into EC2 and Deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            bash /home/ubuntu/deploy.sh